name: Hybrid Wash
description: >
  Heterogeneous pool — slow xfades, decisive masked reveals, and the
  occasional motion-compensated tween. The eye never settles into
  expecting the next cut.

transitions:
  - type: xfade
    weight: 2.0
    params: { mode: fade,        duration: 0.8 }
  - type: xfade
    weight: 2.0
    params: { mode: dissolve,    duration: 0.6 }
  - type: xfade
    weight: 2.0
    params: { mode: wipeleft,    duration: 1.0 }
  - type: xfade
    weight: 1.0
    params: { mode: circleopen,  duration: 1.2 }
  - type: xfade
    weight: 1.0
    params: { mode: radial,      duration: 1.0 }
  - type: xfade
    weight: 1.0
    params: { mode: smoothup,    duration: 1.0 }
  - type: xfade
    weight: 1.0
    params: { mode: pixelize,    duration: 0.3 }
  - type: tween
    weight: 1.0
    params: { duration: 0.7, fps: 30, base: dissolve }
