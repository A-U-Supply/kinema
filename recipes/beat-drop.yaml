name: Beat Drop
description: >
  Cuts on the downbeat (every 4 beats in 4/4). Long image holds between
  cuts, big dramatic transitions when they land — circles opening, fades
  to black, wide wipes.

beat_sync: true
beat_skip: 4

transitions:
  - type: xfade
    weight: 2.0
    params: { mode: circleopen,  duration: 0.5 }
  - type: xfade
    weight: 2.0
    params: { mode: fadeblack,   duration: 0.4 }
  - type: xfade
    weight: 1.5
    params: { mode: radial,      duration: 0.5 }
  - type: xfade
    weight: 1.0
    params: { mode: circleclose, duration: 0.5 }
  - type: xfade
    weight: 1.0
    params: { mode: fadewhite,   duration: 0.3 }
  - type: xfade
    weight: 1.0
    params: { mode: wipeleft,    duration: 0.5 }
