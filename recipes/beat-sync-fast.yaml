name: Beat Sync Fast
description: >
  Every beat is a cut. Hard, fast, punchy transitions — pixelize, slice,
  fadeblack. Image duration dynamically matches the music's tempo via
  librosa beat tracking.

beat_sync: true
beat_skip: 1

transitions:
  - type: xfade
    weight: 2.0
    params: { mode: pixelize,  duration: 0.10 }
  - type: xfade
    weight: 2.0
    params: { mode: hlslice,   duration: 0.10 }
  - type: xfade
    weight: 2.0
    params: { mode: vuslice,   duration: 0.10 }
  - type: xfade
    weight: 1.0
    params: { mode: fadeblack, duration: 0.08 }
  - type: xfade
    weight: 1.0
    params: { mode: fadewhite, duration: 0.08 }
  - type: xfade
    weight: 1.0
    params: { mode: distance,  duration: 0.10 }
